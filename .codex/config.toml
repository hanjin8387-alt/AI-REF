# ============================================================
# PROMETHEUS — Codex 프로젝트 설정
# AI_APEX 다중 에이전트 코드 전수 점검 프레임워크
# ============================================================

model              = "o4-mini"
model_reasoning_effort = "high"
sandbox_mode       = "read-only"

[features]
multi_agent = true

# ────────────────────────────────────────────────────────────
# Agent Roles
# ────────────────────────────────────────────────────────────

[agents]
max_threads = 6

[agents.dead-code]
description = "미사용 변수, 도달 불가 코드, 사용되지 않는 import, 계산되지만 사용되지 않는 값, 버려지는 반환값 등 Dead Code를 탐지합니다."
config_file = "agents/dead-code.toml"

[agents.security]
description = "보안 취약점을 점검합니다: 타이밍 공격, SQL 인젝션, XSS, 비밀키 노출, CORS 설정, 인증/인가 결함."
config_file = "agents/security.toml"

[agents.performance]
description = "성능 및 메모리 문제를 탐지합니다: 무한 성장 캐시, N+1 쿼리, 불필요한 재렌더링, 과도한 데이터 페칭."
config_file = "agents/performance.toml"

[agents.quality]
description = "코드 품질을 점검합니다: 중복 코드, 명명 규칙 위반, 에러 처리 일관성, 타입 안전성, 하드코딩된 값."
config_file = "agents/quality.toml"

[agents.architecture]
description = "아키텍처를 분석합니다: 계층 위반, 순환 의존성, 관심사 분리, 모듈 경계, API 설계 일관성."
config_file = "agents/architecture.toml"

[agents.db-schema]
description = "데이터베이스 스키마를 점검합니다: FK 불일치, 인덱스 누락, 타입 미스매치, RLS 정책, 마이그레이션 안전성."
config_file = "agents/db-schema.toml"
