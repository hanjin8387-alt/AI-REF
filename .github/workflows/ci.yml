name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            prometheus-api/requirements.txt
            prometheus-api/requirements-dev.txt

      - name: Run backend validation
        run: |
          set -o pipefail
          bash scripts/validate-all.sh --mode backend --artifact-dir artifacts \
            | tee artifacts/backend-validation.log

      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: artifacts/backend
          if-no-files-found: error

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prometheus-app/package-lock.json

      - name: Run frontend validation
        run: |
          set -o pipefail
          bash scripts/validate-all.sh --mode frontend --artifact-dir artifacts \
            | tee artifacts/frontend-validation.log

      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: artifacts/frontend
          if-no-files-found: error

  docs-and-drift:
    name: Docs Drift + Validation Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run docs/drift validation
        run: |
          set -o pipefail
          mkdir -p artifacts
          bash scripts/validate-all.sh --mode docs --skip-install --artifact-dir artifacts \
            | tee artifacts/docs-validation.log

      - name: Upload docs/validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-validation-results
          path: artifacts
          if-no-files-found: error
